{% extends "base.html" %}
{% block title %}Bienvenida - ETI{% endblock %}
{% block content %}
<section class="bienvenida">
    <h2>Bienvenido, {{ datos['nombre'] }}</h2>
    <p>Has iniciado sesión como <strong>{{ datos['rol'] }}</strong>.</p>
    <p>Tu correo registrado es: {{ datos['email'] }}</p>
    <p>Hora de ingreso: {{ hora }}:00 hs</p>
    
    <a class="btn-primary" href="{{ url_for('inicio') }}">Ir al Inicio</a>
</section>
{% endblock %}
