<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Usuario</title> <!-- titulo que aparece en la pestaña -->
    </head>
    <body>
        <h1>Inicio de Sesión</h1>
        <!--Esto es un Comentario que no se ve en la aplicación web, pero si en el codigo fuente, ojo!-->
        <form action = "http://localhost:5000/bienvenida" method = "post"> <!-- get(defecto) se ven los datos en la url, post pasa lo contrario, usar siempre post! -->
            <label for = "nombre">Nombre</label><br> <!-- label define las etiquetas -->
            <input type = "text" name="nombre" placeholder = "Nombre"/><br> <!-- input son los cuadros para ingresar textos por ejemplo -->
            <label for = "email">Correo Electronico</label><br>
            <input type = "text" name="email" placeholder = "Gmail"/><br> <!-- name es para identificar esos cuadros -->
            <label for = "password">Contraseña</label><br> <!-- br es un salto de línea -->
            <input type = "password" name="password" placeholder = "Contraseña"/><br> <!--"placeholder" es contenido que sale por defecto(sin que se escriba nada aún) -->
            <input type = "submit" value = "Guardar"/> <!-- submit hace que el contenido que se ingresó vaya al servidor -->
                <br><br>
        </form>
    </body>
</html>
