{% extends "base.html" %}
{% block title %}Login - ETI{% endblock %}
{% block content %}
<section class="login-page">
    <h2>Formulario de Inicio de Sesión</h2>
    <form action="{{ url_for('bienvenida') }}" method="POST">
        <div>
            <label for="nombre">Nombre de Usuario:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Nombre de Usuario" required>
        </div>
        <br>
        <div>
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="Gmail" required>
        </div>
        <br>
        <div>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Contraseña" required>
        </div>
        <br>
        <div>
            <label for="rol">Iniciar sesión como:</label>
            <select id="rol" name="rol" required>
                <option value="" disabled selected>Selecciona tu rol...</option>
                <option value="evaluador">Evaluador</option>
                <option value="organizador">Organizador</option>
            </select>
        </div>
        <br>
        <button type="submit" class="btn-primary">Ingresar</button>
    </form>
</section>
{% endblock %}
