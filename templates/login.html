<!DOCTYPE html>
<html lang = "es">
<head>
    <meta charset = "UTF-8">
    <title>Iniciar Sesión</title> <!-- titulo que aparece en la pestaña -->
</head>
<body>
    <h2>Formulario de Inicio de Sesión</h2>
    <!--Esto es un Comentario que no se ve en la aplicación web, pero si en el codigo fuente, ojo!-->
    <form action = "/bienvenida" method = "POST"> <!-- get(defecto) se ven los datos en la url, post pasa lo contrario, usar siempre post! -->
        <div>
            <label for = "nombre">Nombre de Usuario:</label> <!-- label define las etiquetas -->
            <input type = "text" id = "nombre" name = "nombre" placeholder="Nombre de Usuario"> <!-- input son los cuadros para ingresar textos por ejemplo -->
        </div>
        <br>
        <div>
            <label for = "email">Correo Electrónico:</label>
            <input type = "email" id = "email" name = "email" placeholder = "Gmail"> <!-- name es para identificar esos cuadros -->
        </div>
        <br> <!-- br es un salto de línea -->
        <div>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder = "Contraseña"> <!--"placeholder" es contenido que sale por defecto(sin que se escriba nada aún) -->
        </div>
        <br>
        <div>
            <label for = "rol">Iniciar sesión como:</label>
            <select id = "rol" name = "rol" required>
                <option value = "" disabled selected>Selecciona tu rol...</option>
                <option value = "evaluador">Evaluador</option>
                <option value = "organizador">Organizador</option>
            </select>
        </div>
        <br>
        <button type = "submit">Ingresar</button> <!-- submit hace que el contenido que se ingresó vaya al servidor -->
    </form>
</body>
</html>
